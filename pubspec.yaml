name: app_mobile_ca
description: Application mobile de collecte terrain - Agents CA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1

  # Models (immutable + serialization)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Secure storage (token JWT)
  flutter_secure_storage: ^9.2.2

  # Local DB (mode offline)
  hive_flutter: ^1.1.0

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.2.0

  # Géolocalisation
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Connectivité
  connectivity_plus: ^6.0.3

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.4
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
